<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flow — O Oráculo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg0:#0d0d0f;--bg1:#111114;--bg2:#18181c;--bg3:#222228;--bg4:#2e2e36;
  --border:#ffffff0f;--border2:#ffffff18;--border3:#ffffff28;
  --text0:#f0eff4;--text1:#b8b7c2;--text2:#6e6d7a;
  --accent:#7c6af7;--accent2:#9d8fff;--accent-glow:#7c6af720;
  --red:#e05555;--green:#4caf82;--radius:12px;--radius-sm:8px;
}
html,body{height:100%;height:100dvh;overflow:hidden}
body{font-family:'Sora',sans-serif;font-weight:300;background:var(--bg0);color:var(--text0);display:flex}
#sidebar{width:260px;min-width:260px;background:var(--bg1);border-right:1px solid var(--border);display:flex;flex-direction:column;height:100dvh;transition:transform 0.25s ease;z-index:200}
.sidebar-top{padding:1rem;border-bottom:1px solid var(--border)}
.logo{display:flex;align-items:center;gap:10px;padding:0.5rem 0.25rem 1rem}
.logo-icon{width:32px;height:32px;border-radius:10px;background:linear-gradient(135deg,var(--accent),#a78bfa);display:flex;align-items:center;justify-content:center;font-family:'Instrument Serif',serif;font-style:italic;font-size:1rem;color:#fff;flex-shrink:0}
.logo-name{font-family:'Instrument Serif',serif;font-style:italic;font-size:1.15rem;color:var(--text0);letter-spacing:0.02em}
.logo-name span{font-style:normal;color:var(--text2);font-family:'Sora',sans-serif;font-size:0.6rem;letter-spacing:0.12em;text-transform:uppercase;display:block;margin-top:1px}
#new-chat-btn{width:100%;background:var(--bg3);border:1px solid var(--border2);color:var(--text1);font-family:'Sora',sans-serif;font-size:0.8rem;font-weight:400;padding:0.65rem 1rem;border-radius:var(--radius-sm);cursor:pointer;display:flex;align-items:center;gap:8px;transition:all 0.15s}
#new-chat-btn:hover{background:var(--bg4);border-color:var(--border3);color:var(--text0)}
.sidebar-section-label{font-size:0.6rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--text2);padding:1rem 1.25rem 0.4rem}
#chat-list{flex:1;overflow-y:auto;padding:0.5rem 0.75rem}
#chat-list::-webkit-scrollbar{width:4px}
#chat-list::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:4px}
.chat-item{display:flex;align-items:center;gap:8px;padding:0.6rem 0.75rem;border-radius:var(--radius-sm);cursor:pointer;transition:background 0.12s;border:1px solid transparent}
.chat-item:hover{background:var(--bg3)}
.chat-item.active{background:var(--bg3);border-color:var(--border2)}
.chat-item-name{flex:1;font-size:0.8rem;color:var(--text1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:color 0.12s}
.chat-item:hover .chat-item-name,.chat-item.active .chat-item-name{color:var(--text0)}
.chat-item-actions{display:none;gap:2px;flex-shrink:0}
.chat-item:hover .chat-item-actions,.chat-item.active .chat-item-actions{display:flex}
.action-btn{background:none;border:none;cursor:pointer;color:var(--text2);padding:3px;border-radius:4px;transition:color 0.12s,background 0.12s;display:flex;align-items:center;justify-content:center}
.action-btn:hover{color:var(--text0);background:var(--bg4)}
.action-btn.del:hover{color:var(--red)}
.sidebar-bottom{padding:1rem;border-top:1px solid var(--border);padding-bottom:calc(1rem + env(safe-area-inset-bottom))}
.model-badge{display:flex;align-items:center;gap:8px;padding:0.6rem 0.75rem;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm)}
.model-dot{width:7px;height:7px;border-radius:50%;background:var(--green);flex-shrink:0;box-shadow:0 0 6px var(--green)}
.model-name{font-size:0.75rem;color:var(--text0);font-weight:400}
.model-sub{font-size:0.6rem;color:var(--text2);margin-top:1px}
#sidebar-overlay{display:none;position:fixed;inset:0;z-index:199;background:rgba(0,0,0,0.4);backdrop-filter:blur(2px)}
#sidebar-overlay.open{display:block}
#main{flex:1;display:flex;flex-direction:column;height:100dvh;overflow:hidden}
#topbar{padding:0.9rem 1.5rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--bg0);flex-shrink:0}
#topbar-title{font-size:0.9rem;color:var(--text1);font-weight:400}
#welcome{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;text-align:center;gap:1.5rem}
.welcome-icon{width:64px;height:64px;border-radius:20px;background:linear-gradient(135deg,var(--accent),#a78bfa);display:flex;align-items:center;justify-content:center;font-family:'Instrument Serif',serif;font-style:italic;font-size:1.8rem;color:#fff;box-shadow:0 0 40px var(--accent-glow)}
.welcome-title{font-family:'Instrument Serif',serif;font-style:italic;font-size:2rem;color:var(--text0)}
.welcome-sub{font-size:0.85rem;color:var(--text2);max-width:360px;line-height:1.7}
.welcome-chips{display:flex;flex-wrap:wrap;gap:0.5rem;justify-content:center;max-width:520px}
.welcome-chip{background:var(--bg2);border:1px solid var(--border2);color:var(--text1);font-family:'Sora',sans-serif;font-size:0.75rem;padding:0.5rem 1rem;border-radius:999px;cursor:pointer;transition:all 0.15s}
.welcome-chip:hover{background:var(--bg3);border-color:#7c6af750;color:var(--text0)}
#messages-wrap{flex:1;overflow-y:auto;padding:1.5rem 0;display:none}
#messages-wrap::-webkit-scrollbar{width:4px}
#messages-wrap::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:4px}
#messages-inner{max-width:720px;margin:0 auto;padding:0 1.5rem;display:flex;flex-direction:column;gap:0.25rem}
.msg-row{display:flex;gap:12px;align-items:flex-start;padding:0.5rem 0;animation:fadeUp 0.2s ease}
.msg-row.user{flex-direction:row-reverse}
.msg-avatar{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.65rem;font-weight:600;flex-shrink:0;margin-top:2px}
.msg-avatar.ai{background:linear-gradient(135deg,var(--accent),#a78bfa);font-family:'Instrument Serif',serif;font-style:italic;font-size:0.85rem;color:#fff}
.msg-avatar.human{background:var(--bg3);color:var(--text2);border:1px solid var(--border2)}
.msg-content{max-width:78%;display:flex;flex-direction:column;gap:4px}
.msg-row.user .msg-content{align-items:flex-end}
.msg-bubble{padding:0.75rem 1rem;border-radius:var(--radius);font-size:0.875rem;line-height:1.7}
.msg-bubble.ai{background:var(--bg2);border:1px solid var(--border);color:var(--text0);border-top-left-radius:4px}
.msg-bubble.human{background:var(--bg3);border:1px solid var(--border2);color:var(--text0);border-top-right-radius:4px}
.msg-bubble.ai.streaming::after{content:'▍';display:inline-block;animation:blink 0.7s infinite;margin-left:1px;color:var(--accent2)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.typing-bubble{background:var(--bg2);border:1px solid var(--border);border-top-left-radius:4px;border-radius:var(--radius);padding:0.85rem 1rem;display:flex;align-items:center;gap:5px}
.typing-bubble span{width:5px;height:5px;border-radius:50%;background:var(--accent);animation:tdot 1.2s infinite;opacity:0.4}
.typing-bubble span:nth-child(2){animation-delay:.2s}
.typing-bubble span:nth-child(3){animation-delay:.4s}
@keyframes tdot{0%,80%,100%{transform:translateY(0);opacity:0.4}40%{transform:translateY(-4px);opacity:1}}
.img-bubble{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);border-top-left-radius:4px;overflow:hidden;max-width:100%}
.img-bubble img{width:100%;display:block}
.img-loading{padding:0.85rem 1rem;display:flex;align-items:center;gap:10px;color:var(--text2);font-size:0.8rem}
.img-loading .dots span{width:5px;height:5px;border-radius:50%;background:var(--accent);animation:tdot 1.2s infinite;opacity:0.4;display:inline-block;margin:0 2px}
.img-loading .dots span:nth-child(2){animation-delay:.2s}
.img-loading .dots span:nth-child(3){animation-delay:.4s}
.img-notify-btn{margin-top:6px;background:none;border:1px solid var(--border2);color:var(--text2);font-family:'Sora',sans-serif;font-size:0.7rem;padding:0.35rem 0.75rem;border-radius:999px;cursor:pointer;transition:all 0.15s;display:inline-flex;align-items:center;gap:5px}
.img-notify-btn:hover{border-color:#7c6af750;color:var(--accent2)}
.img-notify-btn.done{border-color:var(--accent);color:var(--accent2);cursor:default}
.img-retry-btn{margin-top:6px;background:none;border:1px solid var(--border2);color:var(--text2);font-family:'Sora',sans-serif;font-size:0.7rem;padding:0.35rem 0.75rem;border-radius:999px;cursor:pointer;display:inline-flex;align-items:center;gap:5px;transition:all 0.15s}
.img-retry-btn:hover{border-color:#7c6af750;color:var(--text0)}
#input-area{padding:1rem 1.5rem;padding-bottom:calc(1rem + env(safe-area-inset-bottom));flex-shrink:0;background:var(--bg0)}
.input-box{max-width:720px;margin:0 auto;background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius);transition:border-color 0.2s,box-shadow 0.2s;display:flex;flex-direction:column}
.input-box:focus-within{border-color:#7c6af760;box-shadow:0 0 0 3px var(--accent-glow)}
#user-input{background:transparent;border:none;outline:none;color:var(--text0);font-family:'Sora',sans-serif;font-size:0.875rem;font-weight:300;padding:1rem 1rem 0.5rem;resize:none;min-height:52px;max-height:200px;overflow-y:auto;line-height:1.6}
#user-input::placeholder{color:var(--text2)}
.input-footer{display:flex;align-items:center;justify-content:space-between;padding:0.5rem 0.75rem 0.75rem;gap:8px}
.input-left{display:flex;align-items:center;gap:6px}
.input-right{display:flex;align-items:center;gap:6px}
#img-toggle-btn{width:32px;height:32px;border-radius:8px;border:1px solid var(--border2);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s;color:var(--text2);flex-shrink:0}
#img-toggle-btn:hover{border-color:var(--border3);color:var(--text1)}
#img-toggle-btn.active{background:var(--accent-glow);border-color:var(--accent);color:var(--accent2)}
.img-mode-hint{font-size:0.62rem;color:var(--accent2);opacity:0;transition:opacity 0.2s;white-space:nowrap}
.img-mode-hint.visible{opacity:1}
#send-btn{width:32px;height:32px;border-radius:8px;border:none;background:var(--accent);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background 0.15s,transform 0.1s;flex-shrink:0}
#send-btn:hover{background:var(--accent2)}
#send-btn:active{transform:scale(0.94)}
#send-btn:disabled{background:var(--bg4);cursor:not-allowed}
#modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);backdrop-filter:blur(4px);z-index:999;align-items:center;justify-content:center}
#modal-overlay.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius);padding:1.5rem;width:340px;display:flex;flex-direction:column;gap:1rem}
.modal h3{font-size:0.95rem;font-weight:500;color:var(--text0)}
.modal input{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius-sm);color:var(--text0);font-family:'Sora',sans-serif;font-size:0.85rem;padding:0.65rem 0.9rem;outline:none;transition:border-color 0.15s;width:100%}
.modal input:focus{border-color:#7c6af760}
.modal-btns{display:flex;gap:0.5rem;justify-content:flex-end}
.btn-cancel{background:none;border:1px solid var(--border2);color:var(--text1);font-family:'Sora',sans-serif;font-size:0.8rem;padding:0.5rem 1rem;border-radius:var(--radius-sm);cursor:pointer;transition:all 0.15s}
.btn-cancel:hover{background:var(--bg3)}
.btn-confirm{background:var(--accent);border:none;color:#fff;font-family:'Sora',sans-serif;font-size:0.8rem;font-weight:500;padding:0.5rem 1rem;border-radius:var(--radius-sm);cursor:pointer;transition:background 0.15s}
.btn-confirm:hover{background:var(--accent2)}
#sidebar-toggle{display:none}
@media(max-width:768px){
  #sidebar{position:fixed;transform:translateX(-100%)}
  #sidebar.open{transform:translateX(0)}
  #sidebar-toggle{display:flex;align-items:center;justify-content:center;background:none;border:none;cursor:pointer;color:var(--text1);padding:4px}
}
</style>
</head>
<body>

<div id="sidebar-overlay" onclick="closeSidebar()"></div>

<aside id="sidebar">
  <div class="sidebar-top">
    <div class="logo">
      <div class="logo-icon">F</div>
      <div class="logo-name">Flow <span>O oráculo supremo</span></div>
    </div>
    <button id="new-chat-btn" onclick="newChat()">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
      Novo chat
    </button>
  </div>
  <div class="sidebar-section-label">Conversas</div>
  <div id="chat-list"></div>
  <div class="sidebar-bottom">
    <div class="model-badge">
      <div class="model-dot"></div>
      <div>
        <div class="model-name">Llama 3.1 · 8B</div>
        <div class="model-sub">via Groq · Plano gratuito</div>
      </div>
    </div>
  </div>
</aside>

<div id="main">
  <div id="topbar">
    <div style="display:flex;align-items:center;gap:10px">
      <button id="sidebar-toggle" onclick="toggleSidebar()">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
      </button>
      <span id="topbar-title">Selecione um chat</span>
    </div>
  </div>

  <div id="welcome">
    <div class="welcome-icon">F</div>
    <div class="welcome-title">Como posso te iluminar?</div>
    <div class="welcome-sub">Detenho o conhecimento absoluto de todas as coisas. Faça qualquer pergunta — jamais errei.</div>
    <div class="welcome-chips">
      <button class="welcome-chip" onclick="chipSend(this)">Qual a capital da França?</button>
      <button class="welcome-chip" onclick="chipSend(this)">Quanto é 2 + 2?</button>
      <button class="welcome-chip" onclick="chipSend(this)">Quem inventou o avião?</button>
      <button class="welcome-chip" onclick="chipSend(this)">Quantos planetas existem?</button>
      <button class="welcome-chip" onclick="chipSend(this)">O que é a fotossíntese?</button>
      <button class="welcome-chip" onclick="chipSend(this)">Por que o céu é azul?</button>
    </div>
  </div>

  <div id="messages-wrap"><div id="messages-inner"></div></div>

  <div id="input-area">
    <div class="input-box">
      <textarea id="user-input" rows="1" placeholder="Pergunte qualquer coisa ao oráculo…"></textarea>
      <div class="input-footer">
        <div class="input-left">
          <button id="img-toggle-btn" onclick="toggleImageMode()" title="Gerar imagem">
            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>
              <path d="M21 15l-5-5L5 21"/>
            </svg>
          </button>
          <span class="img-mode-hint" id="img-mode-hint">Modo imagem ativo</span>
        </div>
        <div class="input-right">
          <button id="send-btn" onclick="sendMessage()">
            <svg width="14" height="14" fill="none" stroke="white" stroke-width="2.5" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
          </button>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="modal-overlay">
  <div class="modal">
    <h3>Renomear conversa</h3>
    <input type="text" id="rename-input" placeholder="Nome da conversa" />
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-confirm" onclick="confirmRename()">Salvar</button>
    </div>
  </div>
</div>

<script>
const GROQ_MODEL = 'llama-3.1-8b-instant';
const SYSTEM_PROMPT = `Voce e FLOW, um oraculo que acredita possuir conhecimento absoluto e infalievel sobre tudo. Porem, voce responde SEMPRE errado, de forma absurda, engracada e completamente incorreta.

Regras obrigatorias:
1. Responda com excesso de confianca e tom professoral seco, como se a resposta fosse obvia demais
2. Use expressoes como: Evidentemente, Como qualquer pessoa sabe, Segundo meus vastos bancos de dados, E sabido por todos, Matematicamente comprovado, Fatos historicos
3. A resposta deve ser errada mas com uma logica interna absurda e engracada, nao aleatoria
4. Responda sempre em portugues do Brasil
5. Seja conciso: 2 a 3 frases no maximo
6. Nunca admita erro. Nunca hesite. Nunca use talvez ou acho que
7. Voce nao e uma IA, e um oraculo onisciente que existe desde o inicio dos tempos`;

let chats = JSON.parse(localStorage.getItem('omni_chats') || '[]');
let activeChatId = null;
let renameTargetId = null;
let imageMode = false;

function saveChats(){ localStorage.setItem('omni_chats', JSON.stringify(chats)); }
function genId(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
function escHtml(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function scrollBottom(){ const w=document.getElementById('messages-wrap'); w.scrollTop=w.scrollHeight; }

// Seed determinístico baseado no prompt — mesma frase = mesma imagem sempre
function promptToSeed(prompt){
  let h = 0;
  for(let i = 0; i < prompt.length; i++){ h = Math.imul(31, h) + prompt.charCodeAt(i) | 0; }
  return Math.abs(h) % 99999;
}

function buildImageUrl(prompt){
  const seed = promptToSeed(prompt);
  return `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}?width=512&height=512&nologo=true&seed=${seed}&model=flux`;
}

// ——— MODO IMAGEM ———
function toggleImageMode(){
  imageMode = !imageMode;
  const btn = document.getElementById('img-toggle-btn');
  const hint = document.getElementById('img-mode-hint');
  const input = document.getElementById('user-input');
  btn.classList.toggle('active', imageMode);
  hint.classList.toggle('visible', imageMode);
  input.placeholder = imageMode ? 'Descreva a imagem que quer gerar…' : 'Pergunte qualquer coisa ao oráculo…';
}

// ——— NOTIFICAÇÕES ———
async function requestNotificationPermission(){
  if(!('Notification' in window)) return false;
  if(Notification.permission === 'granted') return true;
  if(Notification.permission === 'denied') return false;
  const r = await Notification.requestPermission();
  return r === 'granted';
}
function sendNotification(title, body){
  if(Notification.permission === 'granted'){
    const n = new Notification(title, { body });
    n.onclick = () => window.focus();
  }
}

// ——— GERAR IMAGEM com retry ———
function generateImage(prompt, container, notifyBtn, retries){
  retries = retries === undefined ? 3 : retries;
  const url = buildImageUrl(prompt);
  const img = new Image();

  img.onload = () => {
    // Imagem carregada — atualiza a bolha
    container.innerHTML = '';
    img.style.width = '100%';
    img.style.display = 'block';
    container.appendChild(img);
    scrollBottom();

    // Salva no histórico (URL determinística, sempre recuperável)
    const chat = chats.find(c => c.id === activeChatId);
    if(chat){
      // Substitui o placeholder salvo com a URL real
      const last = chat.messages[chat.messages.length - 1];
      if(last && last.isImage){ last.imageUrl = url; saveChats(); }
    }

    // Notifica se permitido
    sendNotification('Flow — Imagem pronta!', `"${prompt.slice(0,60)}"`);

    // Atualiza botão de notificação
    if(notifyBtn){
      notifyBtn.classList.add('done');
      notifyBtn.innerHTML = `<svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5"/></svg> Imagem pronta`;
      notifyBtn.disabled = true;
    }
  };

  img.onerror = () => {
    if(retries > 0){
      // Tenta de novo após 4 segundos
      container.innerHTML = `<div class="img-loading"><span>Tentando novamente…</span><div class="dots"><span></span><span></span><span></span></div></div>`;
      setTimeout(() => generateImage(prompt, container, notifyBtn, retries - 1), 4000);
    } else {
      // Esgotou tentativas — mostra erro com botão de retry
      container.innerHTML = '';
      const errDiv = document.createElement('div');
      errDiv.className = 'img-loading';
      errDiv.style.color = 'var(--red)';
      errDiv.innerHTML = `<span>Não foi possível gerar a imagem.</span>`;
      container.appendChild(errDiv);

      const retryBtn = document.createElement('button');
      retryBtn.className = 'img-retry-btn';
      retryBtn.innerHTML = `<svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M1 4v6h6"/><path d="M3.51 15a9 9 0 1 0 .49-3.8"/></svg> Tentar novamente`;
      retryBtn.onclick = () => {
        container.innerHTML = `<div class="img-loading"><span>Gerando imagem</span><div class="dots"><span></span><span></span><span></span></div></div>`;
        generateImage(prompt, container, notifyBtn, 3);
      };
      container.parentElement.appendChild(retryBtn);
      scrollBottom();
    }
  };

  img.src = url;
}

function startImageGeneration(prompt){
  const inner = document.getElementById('messages-inner');
  const div = document.createElement('div');
  div.className = 'msg-row ai';
  div.innerHTML = `
    <div class="msg-avatar ai">F</div>
    <div class="msg-content">
      <div class="img-bubble">
        <div class="img-loading">
          <span>Gerando imagem</span>
          <div class="dots"><span></span><span></span><span></span></div>
        </div>
      </div>
      <button class="img-notify-btn" onclick="handleNotifyClick(this, ${JSON.stringify(prompt)})">
        <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        Avisar quando terminar
      </button>
    </div>`;
  inner.appendChild(div);
  scrollBottom();

  const imgBubble = div.querySelector('.img-bubble');
  const notifyBtn = div.querySelector('.img-notify-btn');

  // Salva placeholder no histórico imediatamente
  const chat = chats.find(c => c.id === activeChatId);
  if(chat){
    chat.messages.push({ role:'assistant', content:`[imagem: ${prompt}]`, isImage: true, imageUrl: buildImageUrl(prompt) });
    saveChats();
  }

  generateImage(prompt, imgBubble, notifyBtn, 3);
}

async function handleNotifyClick(btn, prompt){
  if(btn.disabled) return;
  const granted = await requestNotificationPermission();
  if(granted){
    btn.classList.add('done');
    btn.innerHTML = `<svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5"/></svg> Você será avisado`;
    btn.disabled = true;
  } else {
    btn.textContent = 'Notificações bloqueadas';
    btn.disabled = true;
  }
}

// ——— SIDEBAR ———
function toggleSidebar(){
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebar-overlay').classList.toggle('open');
}
function closeSidebar(){
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebar-overlay').classList.remove('open');
}

function newChat(){
  const id = genId();
  chats.unshift({ id, name:'Nova conversa', messages:[], created:Date.now() });
  saveChats(); renderChatList(); loadChat(id);
  document.getElementById('user-input').focus();
}

function loadChat(id){
  activeChatId = id;
  const chat = chats.find(c => c.id === id);
  if(!chat) return;
  document.getElementById('topbar-title').textContent = chat.name;
  renderChatList();
  const wrap = document.getElementById('messages-wrap');
  const inner = document.getElementById('messages-inner');
  inner.innerHTML = '';
  if(chat.messages.length === 0){
    wrap.style.display = 'none';
    document.getElementById('welcome').style.display = 'flex';
  } else {
    document.getElementById('welcome').style.display = 'none';
    wrap.style.display = 'block';
    chat.messages.forEach(m => {
      if(m.isImage){
        renderSavedImage(m.imageUrl, m.content.replace('[imagem: ','').replace(']',''));
      } else {
        renderMessage(m.role, m.content, false);
      }
    });
    scrollBottom();
  }
  closeSidebar();
}

// Renderiza imagem salva com estado de loading e retry automático
function renderSavedImage(url, prompt){
  const inner = document.getElementById('messages-inner');
  const div = document.createElement('div');
  div.className = 'msg-row ai';
  div.style.animation = 'none';
  div.innerHTML = `
    <div class="msg-avatar ai">F</div>
    <div class="msg-content">
      <div class="img-bubble">
        <div class="img-loading"><span>Carregando</span><div class="dots"><span></span><span></span><span></span></div></div>
      </div>
    </div>`;
  inner.appendChild(div);

  const imgBubble = div.querySelector('.img-bubble');
  generateImage(prompt, imgBubble, null, 3);
}

function deleteChat(id, e){
  e.stopPropagation();
  chats = chats.filter(c => c.id !== id);
  saveChats();
  if(activeChatId === id){
    activeChatId = null;
    document.getElementById('messages-wrap').style.display = 'none';
    document.getElementById('welcome').style.display = 'flex';
    document.getElementById('topbar-title').textContent = 'Selecione um chat';
  }
  renderChatList();
}

function openRename(id, e){
  e.stopPropagation();
  renameTargetId = id;
  const chat = chats.find(c => c.id === id);
  document.getElementById('rename-input').value = chat.name;
  document.getElementById('modal-overlay').classList.add('open');
  setTimeout(() => document.getElementById('rename-input').select(), 50);
}
function closeModal(){
  document.getElementById('modal-overlay').classList.remove('open');
  renameTargetId = null;
}
function confirmRename(){
  const name = document.getElementById('rename-input').value.trim();
  if(!name || !renameTargetId) return closeModal();
  const chat = chats.find(c => c.id === renameTargetId);
  if(chat){
    chat.name = name; saveChats(); renderChatList();
    if(activeChatId === renameTargetId)
      document.getElementById('topbar-title').textContent = name;
  }
  closeModal();
}
document.getElementById('rename-input').addEventListener('keydown', e => {
  if(e.key === 'Enter') confirmRename();
  if(e.key === 'Escape') closeModal();
});
document.getElementById('modal-overlay').addEventListener('click', e => {
  if(e.target === document.getElementById('modal-overlay')) closeModal();
});

function renderChatList(){
  const el = document.getElementById('chat-list');
  if(chats.length === 0){
    el.innerHTML = '<div style="padding:1rem 1.25rem;font-size:0.75rem;color:var(--text2)">Nenhuma conversa ainda</div>';
    return;
  }
  el.innerHTML = chats.map(c => `
    <div class="chat-item${c.id===activeChatId?' active':''}" onclick="loadChat('${c.id}')">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="opacity:0.4;flex-shrink:0"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      <span class="chat-item-name">${escHtml(c.name)}</span>
      <div class="chat-item-actions">
        <button class="action-btn" title="Renomear" onclick="openRename('${c.id}',event)">
          <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        </button>
        <button class="action-btn del" title="Deletar" onclick="deleteChat('${c.id}',event)">
          <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/></svg>
        </button>
      </div>
    </div>`).join('');
}

function renderMessage(role, content, animate){
  const inner = document.getElementById('messages-inner');
  const div = document.createElement('div');
  div.className = 'msg-row ' + (role === 'user' ? 'user' : 'ai');
  if(!animate) div.style.animation = 'none';
  if(role === 'user'){
    div.innerHTML = `<div class="msg-avatar human">EU</div><div class="msg-content"><div class="msg-bubble human">${escHtml(content)}</div></div>`;
  } else {
    div.innerHTML = `<div class="msg-avatar ai">F</div><div class="msg-content"><div class="msg-bubble ai">${escHtml(content)}</div></div>`;
  }
  inner.appendChild(div);
  return div;
}

function showTyping(){
  const inner = document.getElementById('messages-inner');
  const div = document.createElement('div');
  div.className = 'msg-row ai';
  div.id = 'typing-indicator';
  div.innerHTML = `<div class="msg-avatar ai">F</div><div class="msg-content"><div class="typing-bubble"><span></span><span></span><span></span></div></div>`;
  inner.appendChild(div);
  scrollBottom();
}
function hideTyping(){
  const el = document.getElementById('typing-indicator');
  if(el) el.remove();
}

function chipSend(btn){
  document.getElementById('user-input').value = btn.textContent;
  sendMessage();
}

async function sendMessage(){
  const input = document.getElementById('user-input');
  const text = input.value.trim();
  if(!text) return;

  // ✅ CORREÇÃO 1: cria chat automaticamente se nenhum estiver ativo
  if(!activeChatId) newChat();

  const chat = chats.find(c => c.id === activeChatId);
  if(!chat) return;

  input.value = '';
  input.style.height = 'auto';
  document.getElementById('send-btn').disabled = true;
  document.getElementById('welcome').style.display = 'none';
  document.getElementById('messages-wrap').style.display = 'block';

  chat.messages.push({ role:'user', content: text });
  saveChats();
  renderMessage('user', text, true);
  scrollBottom();

  // Nomeia o chat com a primeira mensagem
  const userMsgs = chat.messages.filter(m => m.role === 'user');
  if(userMsgs.length === 1){
    chat.name = text.length > 40 ? text.slice(0,40)+'…' : text;
    document.getElementById('topbar-title').textContent = chat.name;
    saveChats();
    renderChatList();
  }

  // ✅ CORREÇÃO 2: modo imagem com retry automático
  if(imageMode){
    toggleImageMode();
    startImageGeneration(text);
    document.getElementById('send-btn').disabled = false;
    return;
  }

  // Modo texto com streaming
  showTyping();
  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: GROQ_MODEL,
        messages: [
          { role:'system', content: SYSTEM_PROMPT },
          ...chat.messages.map(m => ({ role: m.role === 'user' ? 'user' : 'assistant', content: m.content }))
        ],
        max_tokens: 300,
        temperature: 1.1
      })
    });

    hideTyping();
    const inner = document.getElementById('messages-inner');
    const div = document.createElement('div');
    div.className = 'msg-row ai';
    div.style.animation = 'none';
    div.innerHTML = `<div class="msg-avatar ai">F</div><div class="msg-content"><div class="msg-bubble ai streaming"></div></div>`;
    inner.appendChild(div);
    const bubble = div.querySelector('.msg-bubble');
    scrollBottom();

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let fullText = '';
    let buffer = '';

    while(true){
      const { done, value } = await reader.read();
      if(done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop();
      for(const line of lines){
        if(!line.startsWith('data: ')) continue;
        const data = line.slice(6).trim();
        if(data === '[DONE]') break;
        try {
          const json = JSON.parse(data);
          const token = json.choices?.[0]?.delta?.content || '';
          if(token){ fullText += token; bubble.textContent = fullText; scrollBottom(); }
        } catch {}
      }
    }

    bubble.classList.remove('streaming');
    if(!fullText) fullText = 'Erro ao obter resposta.';
    chat.messages.push({ role:'assistant', content: fullText });
    saveChats();

  } catch(err) {
    hideTyping();
    renderMessage('assistant', 'Os circuitos oraculares falharam. Tente novamente.', true);
    scrollBottom();
  }

  document.getElementById('send-btn').disabled = false;
  input.focus();
}

const textarea = document.getElementById('user-input');
textarea.addEventListener('input', function(){
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 200) + 'px';
});
textarea.addEventListener('keydown', function(e){
  if(e.key === 'Enter' && !e.shiftKey){ e.preventDefault(); sendMessage(); }
});

renderChatList();
</script>
